<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charantra - Super Admin Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            orange: '#FF5E00',
                            orangeHover: '#e04f00',
                            navyDark: '#070C1E',
                            navyMedium: '#0F172A',
                        }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Titillium Web', sans-serif; background: linear-gradient(135deg, #070C1E 0%, #0F172A 100%); }
        .card-hover { transition: all 0.3s cubic-bezier(0.16,1,0.3,1); }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 24px 48px -12px rgba(255,94,0,0.25); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-8">
    <div class="text-center max-w-4xl w-full">
        <img src="/assets/logo.png" alt="Charantra" class="h-12 mx-auto mb-2" style="filter: brightness(0) invert(1);">
        <p class="text-brand-orange text-xs uppercase tracking-widest font-bold mb-12">Super Admin Console</p>
        
        <div class="grid grid-cols-2 md:grid-cols-4 gap-5">
            <a href="/pages/dashboard.html" class="card-hover bg-white/5 backdrop-blur border border-white/10 rounded-2xl p-6 text-center group">
                <div class="w-12 h-12 rounded-xl bg-brand-orange/20 text-brand-orange flex items-center justify-center mx-auto mb-4 text-xl group-hover:bg-brand-orange group-hover:text-white transition"><i class="fa-solid fa-table-columns"></i></div>
                <h3 class="text-white font-bold text-sm">Dashboard</h3>
                <p class="text-slate-400 text-[11px] mt-1">KPI overview</p>
            </a>
            <a href="/pages/crm.html" class="card-hover bg-white/5 backdrop-blur border border-white/10 rounded-2xl p-6 text-center group">
                <div class="w-12 h-12 rounded-xl bg-purple-500/20 text-purple-400 flex items-center justify-center mx-auto mb-4 text-xl group-hover:bg-purple-500 group-hover:text-white transition"><i class="fa-solid fa-users"></i></div>
                <h3 class="text-white font-bold text-sm">CRM & Users</h3>
                <p class="text-slate-400 text-[11px] mt-1">Investors, Sellers</p>
            </a>
            <a href="/pages/mandates.html" class="card-hover bg-white/5 backdrop-blur border border-white/10 rounded-2xl p-6 text-center group">
                <div class="w-12 h-12 rounded-xl bg-emerald-500/20 text-emerald-400 flex items-center justify-center mx-auto mb-4 text-xl group-hover:bg-emerald-500 group-hover:text-white transition"><i class="fa-solid fa-file-contract"></i></div>
                <h3 class="text-white font-bold text-sm">Mandates</h3>
                <p class="text-slate-400 text-[11px] mt-1">Track & assign</p>
            </a>
            <a href="/pages/deals.html" class="card-hover bg-white/5 backdrop-blur border border-white/10 rounded-2xl p-6 text-center group">
                <div class="w-12 h-12 rounded-xl bg-blue-500/20 text-blue-400 flex items-center justify-center mx-auto mb-4 text-xl group-hover:bg-blue-500 group-hover:text-white transition"><i class="fa-solid fa-briefcase"></i></div>
                <h3 class="text-white font-bold text-sm">Deals Pipeline</h3>
                <p class="text-slate-400 text-[11px] mt-1">M&A flow</p>
            </a>
            <a href="/pages/dataroom.html" class="card-hover bg-white/5 backdrop-blur border border-white/10 rounded-2xl p-6 text-center group">
                <div class="w-12 h-12 rounded-xl bg-amber-500/20 text-amber-400 flex items-center justify-center mx-auto mb-4 text-xl group-hover:bg-amber-500 group-hover:text-white transition"><i class="fa-solid fa-hard-drive"></i></div>
                <h3 class="text-white font-bold text-sm">Data Room</h3>
                <p class="text-slate-400 text-[11px] mt-1">VDR access</p>
            </a>
            <a href="/pages/team.html" class="card-hover bg-white/5 backdrop-blur border border-white/10 rounded-2xl p-6 text-center group">
                <div class="w-12 h-12 rounded-xl bg-rose-500/20 text-rose-400 flex items-center justify-center mx-auto mb-4 text-xl group-hover:bg-rose-500 group-hover:text-white transition"><i class="fa-solid fa-user-group"></i></div>
                <h3 class="text-white font-bold text-sm">Team</h3>
                <p class="text-slate-400 text-[11px] mt-1">Members & roles</p>
            </a>
            <a href="/pages/payments.html" class="card-hover bg-white/5 backdrop-blur border border-white/10 rounded-2xl p-6 text-center group">
                <div class="w-12 h-12 rounded-xl bg-cyan-500/20 text-cyan-400 flex items-center justify-center mx-auto mb-4 text-xl group-hover:bg-cyan-500 group-hover:text-white transition"><i class="fa-solid fa-receipt"></i></div>
                <h3 class="text-white font-bold text-sm">Payments</h3>
                <p class="text-slate-400 text-[11px] mt-1">Invoices & ledger</p>
            </a>
            <a href="/pages/reports.html" class="card-hover bg-white/5 backdrop-blur border border-white/10 rounded-2xl p-6 text-center group">
                <div class="w-12 h-12 rounded-xl bg-indigo-500/20 text-indigo-400 flex items-center justify-center mx-auto mb-4 text-xl group-hover:bg-indigo-500 group-hover:text-white transition"><i class="fa-solid fa-chart-simple"></i></div>
                <h3 class="text-white font-bold text-sm">Reports</h3>
                <p class="text-slate-400 text-[11px] mt-1">Analytics & graphs</p>
            </a>
        </div>
        
        <p class="text-slate-600 text-xs mt-12">© 2026 Charantra — Rhythm of Execution</p>
    </div>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</body>
</html>

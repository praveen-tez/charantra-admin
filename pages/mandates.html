            font-size: 13.5px;
            background-color: var(--workspace-bg);
            color: #1E293B;
            overflow-x: hidden;
        }

        /* Clean animations */
        .fade-in-view {
            animation: cubicFadeIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes cubicFadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Premium rounded scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #E2E8F0;
            border-radius: 99px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #CBD5E1;
        }

        /* Sidebar active style - Rounded pill with thin outline precisely matching original mockup style */
        .sidebar-item-active {
            border-radius: 6px !important;
            background: #1E2128 !important;
            color: #FFFFFF !important;
            border: 1px solid #3F3F46 !important;
        }

        /* Tab highlights */
        .subtab-active {
            color: var(--charantra-orange);
            border-bottom: 2px solid var(--charantra-orange);
        }

        /* Smooth interactive card effects */
        .interactive-card {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .interactive-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px -10px rgba(0, 0, 0, 0.04), 0 4px 10px -2px rgba(0, 0, 0, 0.02);
        }
        
        /* Modal Overlay Transition */
        .modal-active {
            display: flex !important;
            animation: fadeInOverlay 0.2s ease forwards;
        }
        @keyframes fadeInOverlay {
            from { background-color: rgba(0,0,0,0); }
            to { background-color: rgba(15, 17, 21, 0.6); }
        }

        /* Sticky bottom action bar smooth transitions */
        .review-sticky-bar {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

            if (key === 'mandateType') {
                document.getElementById('summary-type').innerText = val;
                document.getElementById('pdf-header-title').innerText = val.toUpperCase() + ' AGREEMENT';

            if (key === 'duration') document.getElementById('summary-duration').innerText = val;

            appState.selectedCompanyId = id;

        }

        function handlePDFSelection(input) {
            if (input.files && input.files[0]) {
                const file = input.files[0];
                appState.uploadedFile = {
                    name: file.name,
                    size: (file.size / (1024 * 1024)).toFixed(1) + ' MB'
                };
                triggerToast(`Uploaded document "${file.name}" ready for OCR metadata extraction.`);
                renderWorkspace();
            }
        }

        function removeUploadedFile() {
            appState.uploadedFile = null;
            renderWorkspace();
        }

        function changePage(increment) {
            if (increment && appState.previewPage < 12) {
                appState.previewPage++;
            } else if (!increment && appState.previewPage > 1) {
                appState.previewPage--;
            }
            renderWorkspace();
        }

                                            <p class="text-xs text-slate-700 font-semibold">${n.text}</p>
                                            <div class="flex justify-between text-[9px] text-slate-400 font-extrabold tracking-wider uppercase">
                                                <span>Added by ${n.author}</span>
                                                <span>${n.date}</span>
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>

                        </div>
                    </div>

                    <!-- Dynamic Review Actions Bottom CTA Bar -->
                    <div id="review-actions-bar" class="bg-white border border-slate-200/60 shadow-xs rounded-md p-5 flex flex-col md:flex-row justify-between items-center gap-4 transition-all duration-300">
                        <div class="flex items-center gap-2.5">
                            <div class="p-2 bg-orange-50 text-orange-600 rounded-md"><i data-lucide="file-signature" class="w-4 h-4"></i></div>
                            <div>
                                <h4 class="text-xs font-bold text-slate-900 uppercase tracking-wider leading-none">Review Actions</h4>
                                <p class="text-[11px] text-slate-400 font-semibold mt-1">Verify all transaction compliance checklists and execute target action.</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-3.5 flex-wrap">
                            <button onclick="approveAndActivateMandate()" class="px-5 py-2.5 bg-[#F97316] hover:bg-[#EA580C] text-white font-extrabold text-xs rounded-md shadow-md shadow-orange-500/10 uppercase tracking-wider transition-colors flex items-center gap-1.5">
                                <i data-lucide="check-circle" class="w-4 h-4"></i>
                                <span>Approve & Activate</span>
                            </button>
                            <button onclick="triggerToast('Information Request template generated')" class="px-4 py-2.5 bg-slate-50 hover:bg-slate-100 border border-slate-200 text-slate-700 font-bold text-xs rounded-md transition-colors flex items-center gap-1.5">
                                <i data-lucide="info" class="w-4 h-4 text-slate-400"></i>
                                <span>Request Information</span>
                            </button>
                            <button onclick="toggleOnHoldState('${item.id}')" class="px-4 py-2.5 bg-slate-50 hover:bg-slate-100 border border-slate-200 text-slate-700 font-bold text-xs rounded-md transition-colors flex items-center gap-1.5">
                                <i data-lucide="pause-circle" class="w-4 h-4 text-slate-400"></i>
                                <span>Place On Hold</span>
                            </button>
                            <button onclick="archiveMandate('${item.id}')" class="px-4 py-2.5 bg-rose-50 hover:bg-rose-100 text-rose-700 border border-rose-100 font-bold text-xs rounded-md transition-colors flex items-center gap-1.5">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                                <span>Archive Mandate</span>
                            </button>
                        </div>
                    </div>

                </div>
            `;
        }

        // --- DYNAMIC INTERACTIONS FOR DETAILED WORKSPACE ---
        function toggleChecklist(key) {
            const item = appState.mandates.find(m => m.id === appState.selectedMandateId) || appState.mandates[0];
            item.checklist[key] = !item.checklist[key];
            triggerToast(`Checklist parameter "${key}" toggled dynamically.`);
            renderWorkspace();
        }

        function toggleOnHoldState(id) {
            const item = appState.mandates.find(m => m.id === id);
            if (item.status === 'ON HOLD') {
                item.status = 'ASSIGNED';
                triggerToast('Mandate operational active status resumed.');
            } else {
                item.status = 'ON HOLD';
                triggerToast('Mandate successfully put on administrative hold.');
            }
            renderWorkspace();
        }

        function archiveMandate(id) {
            appState.mandates = appState.mandates.filter(m => m.id !== id);
            triggerToast('Mandate successfully archived and cleared from operational rosters.');
            changeSection('list');
        }

        function approveAndActivateMandate() {
            const item = appState.mandates.find(m => m.id === appState.selectedMandateId) || appState.mandates[0];
            item.status = 'COMPLETED';
            item.signatureStatus = 'SIGNED';
            item.checklist.paymentVerified = true;
            item.checklist.kycAvailable = true;
            triggerToast('Compliance checklists verified! Mandate successfully Approved and secure workspace activated.');
            changeSection('list');
        }

        function triggerAddNotePrompt() {
            const container = document.getElementById('modal-container');
            container.innerHTML = `
                <div class="bg-white rounded-md p-6 max-w-md w-full shadow-2xl border border-slate-100 space-y-4 fade-in-view">
                    <div>
                        <h3 class="text-sm font-black text-slate-900 tracking-tight">Add Internal Review Memo</h3>
                        <p class="text-[11px] text-slate-400 font-semibold mt-0.5">Memos are encrypted and stored inside supervisory audit logs.</p>
                    </div>
                    <textarea id="memo-input" placeholder="Enter compliance audit comments..." class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-md text-xs outline-none h-24 font-semibold text-slate-700"></textarea>
                    <div class="flex justify-end gap-2.5 pt-2">
                        <button onclick="closeModal()" class="px-4 py-2 border rounded-md text-xs font-bold text-slate-500">Cancel</button>
                        <button onclick="submitInternalMemo()" class="px-4 py-2 bg-orange-600 text-white font-bold text-xs rounded-md">Add Note</button>
                    </div>
                </div>
            `;
            container.classList.remove('hidden');
            container.classList.add('modal-active');
            lucide.createIcons();
        }

        function submitInternalMemo() {
            const text = document.getElementById('memo-input').value;
            if (!text) return;
            const item = appState.mandates.find(m => m.id === appState.selectedMandateId) || appState.mandates[0];
            item.internalNotes.unshift({
                text: text,
                author: 'Karthik',
                date: 'Just Now'
            });
            triggerToast('Compliance note recorded on secure transaction logs.');
            closeModal();
            renderWorkspace();
        }
    </script>

    <!-- CORE WORKSPACE CONTROLLER AND SCROLL-SENSITIVE CTA LAYOUTS -->
    <script>
        function renderWorkspace() {
            const container = document.getElementById('workspace-target');
            if (!container) return;
            container.innerHTML = '';

            let content = '';
            if (appState.viewMode === 'list') {
                content = getDirectoryView();
            } else if (appState.viewMode === 'create') {
                content = getCreateMandateHTML();
            } else {
                content = getMandateReviewHTML();
            }

            container.innerHTML = content;
            lucide.createIcons();
            
            // Recalculate layout constraints for sticky bottom CTA bar
            setTimeout(handleWindowScroll, 50);
        }

        // Support fallback view mapping CRM list seamlessly
        function getDirectoryView() {
            return getMandateDirectoryHTML();
        }

        function closeModal() {
            const container = document.getElementById('modal-container');
            container.classList.add('hidden');
            container.classList.remove('modal-active');
        }

        // --- SCROLL ACTION FOR DYNAMIC FLOATING CTA BAR ---
        function handleWindowScroll() {
            const bar = document.getElementById('review-actions-bar');
            if (!bar) return;

            const rect = bar.getBoundingClientRect();
            const totalHeight = document.documentElement.scrollHeight;
            const visibleHeight = document.documentElement.clientHeight;
            const currentScroll = window.scrollY;

            // If page is scrollable, and the user hasn't scrolled all the way to the static bottom bar
            if (totalHeight > visibleHeight && (currentScroll + visibleHeight < totalHeight - 140)) {
                // Dock/Float CTAs beautifully to the viewport bottom with professional blur shadow
                bar.classList.add('fixed', 'bottom-4', 'right-8', 'shadow-[0_-12px_40px_rgba(0,0,0,0.06)]', 'bg-white/95', 'backdrop-blur-md', 'z-40');
                bar.style.left = 'calc(20rem + 2rem)'; // Sidebar (80 / 20rem) + Workspace Padding (2rem / 8px)
            } else {
                // Sit statically inside the parent layout
                bar.classList.remove('fixed', 'bottom-4', 'right-8', 'shadow-[0_-12px_40px_rgba(0,0,0,0.06)]', 'bg-white/95', 'backdrop-blur-md', 'z-40');
                bar.style.left = 'auto';
            }
        }

        // --- PRIVATE ADVISOR CONSULTATION MODAL DIALOG ---
        function triggerAdvisorChat() {
            const container = document.getElementById('modal-container');
            container.innerHTML = `
                <div class="bg-white rounded-md p-6 max-w-md w-full shadow-2xl border border-slate-100 space-y-4 fade-in-view">
                    <div class="flex justify-between items-center border-b pb-3">
                        <div class="flex items-center gap-2">
                            <span class="w-2.5 h-2.5 bg-green-500 rounded-md animate-pulse"></span>
                            <h3 class="text-sm font-black text-slate-900 tracking-tight">Secure Consultation Desk</h3>
                        </div>
                        <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600"><i data-lucide="x" class="w-4 h-4"></i></button>
                    </div>
                    <div class="h-48 overflow-y-auto space-y-2.5 p-2 bg-slate-50/50 rounded-md text-xs">
                        <p class="text-slate-400 text-center text-[10px] uppercase font-bold py-2 tracking-widest border-b border-slate-100">Private Escrow Thread Verified</p>
                        <div class="p-3 bg-white rounded-md shadow-xs border border-slate-100 max-w-[90%]">
                            <p class="font-bold text-orange-600">Akash Kumar <span class="text-[9px] text-slate-400 font-normal">Advisor Desk</span></p>
                            <p class="text-slate-700 leading-relaxed font-semibold mt-1">Hello, I have updated the automated checks on the Series-A prospectus guidelines. Please approve the current onboarded client agreements as soon as you have finished auditing the compliance proofs.</p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <input id="adv-msg-input" type="text" placeholder="Write secure message to Akash..." class="flex-1 p-2.5 border rounded-md text-xs outline-none focus:border-orange-500 transition-all font-semibold">
                        <button onclick="triggerToast('Consultation message encrypted and logged on transaction ledger.'); closeModal();" class="px-4 py-2 bg-orange-600 hover:bg-orange-700 text-white font-bold text-xs rounded-md font-semibold">Send</button>
                    </div>
                </div>
            `;
            container.classList.remove('hidden');
            container.classList.add('modal-active');
            lucide.createIcons();
        }
    </script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const currentPath = window.location.pathname;
            const buttons = document.querySelectorAll('.sidebar-btn');
            buttons.forEach(btn => {
                const parent = btn.parentElement;
                if (parent && parent.tagName === 'A') {
                    const href = parent.getAttribute('href');
                    if (currentPath.includes(href.split('/').pop()) || (currentPath === '/' && href.includes('dashboard.html'))) {
                        btn.classList.add('sidebar-item-active');
                    }
                }
            });
        });
    </script>

</body>
</html>

        :root {

        body {
            font-family: 'Titillium Web', sans-serif;
            font-size: 13.5px;
            background-color: var(--workspace-bg);
            color: #1E293B;
            overflow-x: hidden;
        }

        /* Clean animations */
        .fade-in-view {
            animation: cubicFadeIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes cubicFadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Premium rounded scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #E2E8F0;
            border-radius: 99px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #CBD5E1;
        }

        /* Sidebar active style - Rounded pill with thin outline matching image exactly */
        .sidebar-item-active {
            border-radius: 6px !important;
            background: #1E2128 !important;
            color: #FFFFFF !important;
            border: 1px solid #3F3F46 !important;
        }

        /* Tab highlights */
        .subtab-active {
            color: var(--charantra-orange);
            border-bottom: 2px solid var(--charantra-orange);
        }

        /* Smooth interactive card effects */
        .interactive-card {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .interactive-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px -10px rgba(0, 0, 0, 0.04), 0 4px 10px -2px rgba(0, 0, 0, 0.02);
        }
        
        /* Modal Overlay Transition */
        .modal-active {
            display: flex !important;
            animation: fadeInOverlay 0.2s ease forwards;
        }
        @keyframes fadeInOverlay {
            from { background-color: rgba(0,0,0,0); }
            to { background-color: rgba(15, 17, 21, 0.6); }
        }
    </style>

        // UI navigation control
        function changeSection(secId) {
            appState.activeSection = secId;
            document.querySelectorAll('.sidebar-btn').forEach(btn => {
                btn.classList.remove('sidebar-item-active');
            });
            const activeBtn = document.getElementById(`nav-${secId}`);
            if (activeBtn) activeBtn.classList.add('sidebar-item-active');

            renderWorkspace();
        }

        function changeSubTab(secId, tabId) {
            appState.activeSubTabs[secId] = tabId;
            renderWorkspace();
        }

        // Fast state interactions
        function triggerToast(msg) {}, 4000);
        }

        function dismissToast() {
            const toast = document.getElementById('toast-notif');
            toast.classList.remove('translate-y-0', 'opacity-100');
            toast.classList.add('translate-y-20', 'opacity-0');
        }

        function executeGlobalSearch() {
            const q = document.getElementById('global-search').value.toLowerCase();
            if (q.length > 2) {
                const results = appState.investees.filter(c => c.name.toLowerCase().includes(q))
                    .concat(appState.investors.filter(i => i.name.toLowerCase().includes(q)));
                if (results.length > 0) {
                    triggerToast(`Found ${results.length} records dynamically.`);
                }
            }
        }

        function closeModal() {
            const container = document.getElementById('modal-container');
            container.classList.remove('modal-active');
            container.classList.add('hidden');
            container.innerHTML = '';

                                            <td class="px-6 py-4 font-mono text-[10px] text-slate-400">${t.utr}</td>
                                            <td class="px-6 py-4">
                                                <span class="px-2 py-0.5 rounded text-[10px] font-bold uppercase ${
                                                    t.status === 'Verified' ? 'bg-green-50 text-green-700' : 'bg-amber-50 text-amber-700'
                                                }">${t.status}</span>
                                            </td>
                                            <td class="px-6 py-4 text-center">
                                                <button onclick="triggerReceiptModal('${t.txnId}', '${t.company}', '${t.type}', '${t.amount}', '${t.utr}')" class="text-orange-500 hover:text-orange-600 bg-transparent font-bold hover:underline text-[10px] px-3.5 py-1.5 uppercase font-semibold">View Receipt</button>
                                            </td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `;
        }

        function triggerReceiptModal(id, co, type, amt, utr) {
            const container = document.getElementById('modal-container');
            container.innerHTML = `
                <div class="bg-white rounded-md p-8 max-w-sm w-full shadow-2xl border border-slate-100 space-y-6">
                    <div class="text-center pb-4 border-b border-slate-100">
                        <h3 class="text-lg font-extrabold text-slate-900 tracking-wider">CHARANTRA TRANSACTION RECEIPT</h3>
                        <p class="text-[10px] text-slate-400 uppercase tracking-widest mt-1">Level 4 Certified Audit Desk</p>
                    </div>
                    <div class="space-y-3 text-xs">
                        <div class="flex justify-between"><span class="text-slate-400 font-semibold">Receipt Code:</span><span class="font-bold text-slate-800">${id}</span></div>
                        <div class="flex justify-between"><span class="text-slate-400 font-semibold">Target Entity:</span><span class="font-bold text-slate-800">${co}</span></div>
                        <div class="flex justify-between"><span class="text-slate-400 font-semibold">Category:</span><span class="font-bold text-slate-800">${type}</span></div>
                        <div class="flex justify-between"><span class="text-slate-400 font-semibold">Volume Transacted:</span><span class="font-bold text-slate-800">${amt}</span></div>
                        <div class="flex justify-between"><span class="text-slate-400 font-semibold">UTR Code:</span><span class="font-mono text-slate-800">${utr}</span></div>
                    </div>
                    <div class="flex justify-end pt-4 border-t border-slate-100">
                        <button onclick="closeModal()" class="px-6 py-2 bg-slate-900 text-white rounded-md font-bold uppercase text-[10px]">Close Receipt</button>
                    </div>
                </div>
            `;
            container.classList.remove('hidden');
            container.classList.add('modal-active');
            lucide.createIcons();
        }
    </script>

    <script>
        // --- CENTRAL WORKSPACE ROTATION DESK ---
        function renderWorkspace() {
            const container = document.getElementById('workspace-target');
            if (!container) return;
            container.innerHTML = '';
            
            let template = '';
            switch (appState.activeSection) {
                case 'dashboard':
                    template = getDashboardView();
                    break;
                case 'crm':
                    template = getCrmView();
                    break;
                case 'deals':
                    template = getDealsView();
                    break;
                case 'mandates':
                    template = getMandatesView();
                    break;
                case 'data-room':
                    template = getDataRoomView();
                    break;
                case 'team-management':
                    template = getTeamManagementView();
                    break;
                case 'payments-invoices':
                    template = getPaymentsView();
                    break;
                case 'reports-analytics':
                    template = getReportsView();
                    break;
                case 'settings':
                    template = getSettingsView();
                    break;
                default:
                    template = getDashboardView();
            }
            container.innerHTML = template;
            lucide.createIcons();
            
            // Re-fire sub-module custom render callbacks
            if (appState.activeSection === 'mandates' && appState.activeSubTabs['mandates'] === 'template-builder') {
                updateAiTemplatePreview();
            }
        }

        // Initialize App to active dashboards dynamically
        window.onload = () => {
            changeSection('team-management');
        };
    </script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const currentPath = window.location.pathname;
            const buttons = document.querySelectorAll('.sidebar-btn');
            buttons.forEach(btn => {
                const parent = btn.parentElement;
                if (parent && parent.tagName === 'A') {
                    const href = parent.getAttribute('href');
                    if (currentPath.includes(href.split('/').pop()) || (currentPath === '/' && href.includes('dashboard.html'))) {
                        btn.classList.add('sidebar-item-active');
                    }
                }
            });
        });
    </script>

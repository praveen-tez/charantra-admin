function buildSidebar() {
    const nav = document.getElementById('sidebar-nav');
    nav.innerHTML = '';
    sidebarItems.forEach(item => {
        if (item.id === 'divider') {
            nav.innerHTML += '<div class="border-t border-slate-900/50 my-2"></div>';
            return;
        }
        if (item.children) {
            nav.innerHTML += `<div class="space-y-0.5"><button onclick="toggleSidebarSection('sec-${item.id}')" class="w-full flex items-center justify-between px-3 py-2.5 rounded-lg font-medium text-slate-400 hover:bg-slate-900 hover:text-white transition duration-150 overflow-hidden"><span class="flex items-center gap-3"><i class="fa-solid ${item.icon} text-sm shrink-0"></i><span class="sidebar-label whitespace-nowrap">${item.label}</span></span><i class="fa-solid fa-chevron-down text-[9px] transition-transform duration-200 sidebar-arrow" id="arrow-sec-${item.id}"></i></button><div id="sec-${item.id}" class="pl-5 pr-1 space-y-0.5 overflow-hidden sidebar-section-div" style="max-height:0;transition:max-height 0.3s ease">`;
            item.children.forEach(ch => {
                nav.innerHTML += `<button onclick="navigateTo('${ch.view}','${ch.param}')" class="w-full text-left py-1.5 px-3 rounded text-xs text-slate-400 hover:bg-slate-900 hover:text-white transition flex items-center gap-2 overflow-hidden" id="sub-${ch.id}"><i class="fa-solid ${ch.icon} text-[10px] w-4 text-center shrink-0"></i><span class="sidebar-label whitespace-nowrap">${ch.label}</span></button>`;
            });
            nav.innerHTML += '</div></div>';
        } else {
            nav.innerHTML += `<button onclick="navigateTo('${item.id}')" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg font-medium text-slate-400 hover:bg-slate-900 hover:text-white transition duration-150 overflow-hidden" id="nav-${item.id}"><i class="fa-solid ${item.icon} text-sm shrink-0"></i><span class="sidebar-label whitespace-nowrap">${item.label}</span></button>`;
        }
    });
}

function toggleRoleDropdown(){document.getElementById('role-dropdown').classList.toggle('hidden')}

// === ROUTER ===
let currentView = 'dashboard';
let currentParam = '';

function navigateTo(view, param) {
    currentView = view;
    currentParam = param || '';
    window.location.hash = param ? `#${view}/${param}` : `#${view}`;
    renderView();
    highlightSidebar();
}

function highlightSidebar() {
    document.querySelectorAll('#sidebar-nav button').forEach(b => b.classList.remove('nav-active'));
    document.querySelectorAll('#sidebar-nav button').forEach(b => { if(!b.classList.contains('nav-active')) b.classList.add('text-slate-400'); });
    
    sidebarItems.forEach(item => {
        if (item.children) {
            item.children.forEach(ch => {
                if (ch.view === currentView && ch.param === currentParam) {
                    const btn = document.getElementById('sub-'+ch.id);
                    if (btn) { btn.classList.add('nav-active'); btn.classList.remove('text-slate-400'); }
                    // Expand parent section
                    const sec = document.getElementById('sec-'+item.id);
                    if (sec) sec.style.maxHeight = '200px';
                    const arrow = document.getElementById('arrow-sec-'+item.id);
                    if (arrow) arrow.style.transform = 'rotate(180deg)';
                }
            });
        }
    });
    
    const mainBtn = document.getElementById('nav-'+currentView);
    if (mainBtn && !currentParam) { mainBtn.classList.add('nav-active'); mainBtn.classList.remove('text-slate-400'); }
}

function renderDashboardData(){
    const pa=document.getElementById('pending-actions-body');pa.innerHTML='';

}

function clearAction(id){const i=DB.pendingActions.findIndex(a=>a.id===id);if(i>-1){const a=DB.pendingActions[i];DB.pendingActions.splice(i,1);DB.recentActivities.unshift({title:`Cleared: ${a.name}`,timeText:"Just now",icon:"fa-circle-check text-emerald-600",bg:"bg-emerald-50"});renderDashboardData()}}

function initCharts(){setTimeout(()=>{const cl=document.getElementById('chart-rev');if(!cl)return;const g=cl.getContext('2d').createLinearGradient(0,0,0,200);g.addColorStop(0,'rgba(255,117,31,0.45)');g.addColorStop(1,'rgba(255,255,255,0)');new Chart(cl,{type:'line',data:{labels:['1 May','8 May','15 May','22 May','29 May'],datasets:[{data:[1.0,2.6,2.3,3.8,4.2],borderColor:'#FF751F',borderWidth:3.5,backgroundColor:g,fill:true,tension:0.35,pointBackgroundColor:'#FF751F',pointBorderColor:'#fff',pointBorderWidth:2,pointRadius:5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{min:0,max:5,ticks:{callback:v=>'₹'+v+' Cr',stepSize:1,font:{size:9,weight:'bold'}},grid:{color:'#f3f4f6'}},x:{grid:{display:false},ticks:{font:{size:10,weight:'bold'}}}}}});
const lv=[{label:'Draft',val:18,pct:'20%',color:'#3b82f6'},{label:'Qual Review',val:12,pct:'13%',color:'#38bdf8'},{label:'Sent',val:15,pct:'17%',color:'#FF751F'},{label:'Awaiting Sig',val:20,pct:'22%',color:'#fbbf24'},{label:'Signed',val:16,pct:'18%',color:'#10b981'},{label:'Expired',val:5,pct:'6%',color:'#ec4899'},{label:'Closed',val:3,pct:'4%',color:'#1e293b'}];
const cd=document.getElementById('chart-donut');if(!cd)return;new Chart(cd,{type:'doughnut',data:{labels:lv.map(l=>l.label),datasets:[{data:lv.map(l=>l.val),backgroundColor:lv.map(l=>l.color),borderWidth:2,borderColor:'#fff'}]},options:{responsive:true,maintainAspectRatio:false,cutout:'72%',plugins:{legend:{display:false}}}});
const dl=document.getElementById('donut-legend');dl.innerHTML='';lv.forEach(i=>{dl.innerHTML+=`<div class="flex items-center justify-between font-medium"><div class="flex items-center gap-1.5 min-w-0"><span class="w-2.5 h-2.5 rounded-full shrink-0" style="background:${i.color}"></span><span class="text-slate-600 truncate text-[10px]">${i.label}</span></div><span class="text-slate-800 font-bold ml-2">${i.val} <span class="text-[9px] text-slate-400">(${i.pct})</span></span></div>`})},200)}

function renderCRM() {
    const type = currentParam || 'Investor';
    const filtered = DB.users.filter(u => u.type === type);
    const total = DB.users.length, active = DB.users.filter(u=>u.status==='Active').length;
    const c = document.getElementById('app-content');
    c.innerHTML = `<section class="space-y-6 fade-in">
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4"><div><h2 class="text-2xl font-bold text-slate-900">${type}s Directory</h2><p class="text-slate-500 text-xs mt-1">Manage all ${type.toLowerCase()} profiles onboarded.</p></div></div>
    <div class="flex flex-wrap gap-3">
        ${[{l:'Total',v:total,cl:'purple',ic:'fa-users'},{l:'Active',v:active,cl:'emerald',ic:'fa-circle-user'},{l:'On Hold',v:DB.users.filter(u=>u.status==='On Hold').length,cl:'amber',ic:'fa-clock-rotate-left'},{l:'Inactive',v:DB.users.filter(u=>u.status==='Inactive').length,cl:'red',ic:'fa-user-slash'}].map(k=>`<div class="bg-white border border-slate-200 rounded-xl px-4 py-2.5 shadow-sm flex items-center gap-3"><div class="p-2 rounded-lg bg-${k.cl}-50 text-${k.cl}-600"><i class="fa-solid ${k.ic} text-sm"></i></div><span class="text-[11px] font-bold text-slate-400 uppercase">${k.l}</span><span class="text-lg font-extrabold text-slate-900">${k.v}</span></div>`).join('')}
    </div>
    <div class="bg-white rounded-2xl border border-slate-100 overflow-hidden shadow-sm">
        <div class="overflow-x-auto"><table class="w-full text-left text-xs"><thead><tr class="bg-slate-50 border-b border-slate-100 text-slate-500 text-[10px] uppercase font-bold"><th class="p-4 w-12 text-center"><input type="checkbox" class="accent-brand-orange cursor-pointer rounded"></th><th class="p-4">Name</th><th class="p-4">Company</th><th class="p-4">Type</th><th class="p-4">Status</th><th class="p-4">Date</th><th class="p-4">Last Active</th><th class="p-4">Assigned</th><th class="p-4 text-center">Actions</th></tr></thead><tbody id="crm-table-body"></tbody></table></div>
    </div></section>`;
    setTimeout(()=>renderCrmTable(filtered),50);
}

function renderCrmTable(users){
    const tb=document.getElementById('crm-table-body');tb.innerHTML='';
    users.forEach(u=>{let sc="bg-emerald-50 text-emerald-700";if(u.status==='On Hold')sc="bg-amber-50 text-amber-700";else if(u.status==='Inactive')sc="bg-slate-100 text-slate-500";
    tb.innerHTML+=`<tr class="hover:bg-slate-50/60 border-b border-slate-100"><td class="p-4 text-center"><input type="checkbox" class="accent-brand-orange cursor-pointer rounded"></td><td class="p-4 flex items-center gap-3"><div class="w-8 h-8 rounded-lg ${u.bgClass} flex items-center justify-center font-bold text-xs">${u.initial}</div><div><a href="#crm-detail/${encodeURIComponent(u.name)}" onclick="navigateTo('crm-detail','${u.name}')" class="font-bold text-slate-900 hover:text-brand-orange hover:underline">${u.name}</a><span class="text-[10px] text-slate-400 block mt-0.5">${u.email}</span></div></td><td class="p-4 font-semibold text-slate-700">${u.company}</td><td class="p-4"><span class="bg-purple-50 text-purple-600 text-[10px] font-bold px-2 py-0.5 rounded-full">${u.type}</span></td><td class="p-4"><span class="text-[10px] font-bold px-2 py-0.5 rounded-full border ${sc}">${u.status}</span></td><td class="p-4 text-slate-500">${u.date}</td><td class="p-4 text-slate-500">${u.lastActive}</td><td class="p-4 font-bold text-slate-700">${u.assigned}</td><td class="p-4 text-center"><div class="flex items-center justify-center gap-1"><a href="#crm-detail/${encodeURIComponent(u.name)}" onclick="navigateTo('crm-detail','${u.name}')" class="text-slate-400 hover:text-brand-orange p-1.5 rounded"><i class="fa-solid fa-eye text-xs"></i></a><button class="text-slate-400 hover:text-blue-500 p-1.5 rounded"><i class="fa-regular fa-comment-dots text-xs"></i></button><button onclick="deleteUser('${u.id}')" class="text-rose-400 hover:text-rose-600 p-1.5 rounded"><i class="fa-solid fa-trash text-xs"></i></button></div></td></tr>`});
}

function deleteUser(id){DB.users=DB.users.filter(u=>u.id!==id);renderCRM()}

function renderCRMDetail(){
    const name = decodeURIComponent(currentParam||'');
    const c = document.getElementById('app-content');
    c.innerHTML = `<section class="space-y-6 fade-in">
    <div class="flex items-center gap-3 border-b border-slate-200 pb-4"><button onclick="navigateTo('crm','Investor')" class="bg-white hover:bg-slate-50 border border-slate-200 text-slate-700 text-xs font-bold px-3 py-2 rounded-lg flex items-center gap-2"><i class="fa-solid fa-arrow-left text-brand-orange"></i> Back</button><div><h2 class="text-2xl font-bold text-slate-900">${name}</h2><p class="text-slate-500 text-xs mt-1">Company profile and fundraising details.</p></div></div>
    <div class="bg-white rounded-2xl border border-slate-200 p-6"><h4 class="font-bold text-sm text-slate-900 mb-4">Company Overview</h4><div class="grid grid-cols-2 gap-4 text-xs"><div><span class="text-[10px] text-slate-400 font-bold uppercase block">Company Name</span><span class="font-bold text-slate-800">${name}</span></div><div><span class="text-[10px] text-slate-400 font-bold uppercase block">Status</span><span class="font-semibold text-slate-700">Active Profile</span></div></div></div>
    <div class="bg-white rounded-2xl border border-slate-200 p-6"><h4 class="font-bold text-sm text-slate-900 mb-4">Notes</h4><textarea id="crm-note" rows="3" class="w-full text-xs p-3 border border-slate-200 rounded-xl focus:outline-none focus:border-brand-orange" placeholder="Private notes..."></textarea><div class="flex justify-end mt-2"><button onclick="saveNote('${name}')" class="bg-brand-orange hover:bg-brand-orangeHover text-white text-xs font-bold px-4 py-1.5 rounded-lg">Save Note</button></div></div></section>`;
    setTimeout(()=>{const n=localStorage.getItem('note_'+name);if(n)document.getElementById('crm-note').value=n},50);
}

function saveNote(name){localStorage.setItem('note_'+name,document.getElementById('crm-note').value)}

function renderDeals(){
    const flow = currentParam || 'equity';
    const filtered = DB.deals.filter(d => d.flow === flow);
    const title = flow === 'equity' ? 'Equity Flow Deals' : 'M&A Flow Deals';
    const desc = flow === 'equity' ? 'Fundraising between Investees and Investors.' : 'Mergers, Acquisitions, and Corporate Buyouts.';
    const c = document.getElementById('app-content');
    c.innerHTML = `<section class="space-y-6 fade-in"><div><h2 class="text-2xl font-extrabold text-slate-950">Active Mandates</h2><p class="text-slate-500 text-xs mt-1">${desc}</p></div>
    <div class="bg-white rounded-2xl border border-slate-100 overflow-hidden shadow-sm"><div class="p-4 border-b border-slate-100 flex justify-between items-center"><h3 class="text-sm font-bold text-slate-900">${title}</h3><span class="text-xs text-slate-400">${filtered.length} deals</span></div>
    <div class="overflow-x-auto"><table class="w-full text-left text-xs"><thead><tr class="bg-slate-50 border-b border-slate-100 text-slate-500 text-[10px] uppercase font-bold"><th class="p-4">Deal ID</th><th class="p-4">${flow==='equity'?'Investee':'Seller'}</th><th class="p-4">${flow==='equity'?'Investor':'Buyer'}</th><th class="p-4">Amount</th><th class="p-4">Stage</th><th class="p-4">Match</th><th class="p-4">Date</th></tr></thead><tbody id="deals-table-body"></tbody></table></div></div></section>`;
    setTimeout(()=>renderDealsTable(filtered),50);
}

function renderDealsTable(deals){
    const tb=document.getElementById('deals-table-body');tb.innerHTML='';
    if(!deals.length){tb.innerHTML='<tr><td colspan="7" class="p-10 text-center text-slate-400">No deals found.</td></tr>';return}
    deals.forEach(d=>{const sc=d.stage==='Closed'?'bg-emerald-50 text-emerald-700':d.stage==='Due Diligence'?'bg-blue-50 text-blue-700':'bg-amber-50 text-amber-700';tb.innerHTML+=`<tr class="hover:bg-slate-50/60 border-b border-slate-100"><td class="p-4 font-bold text-slate-700">${d.id}</td><td class="p-4 font-semibold text-slate-800">${d.sideA}</td><td class="p-4 text-slate-600">${d.sideB}</td><td class="p-4 font-extrabold text-brand-orange">${d.amount}</td><td class="p-4"><span class="text-[10px] font-bold px-2 py-0.5 rounded-full ${sc}">${d.stage}</span></td><td class="p-4 font-bold text-emerald-600">${d.matchRate}</td><td class="p-4 text-slate-500">${d.date}</td></tr>`})}

function renderMandates(){
    const c = document.getElementById('app-content');
    c.innerHTML = `<section class="space-y-6 fade-in"><div><h2 class="text-2xl font-extrabold text-slate-950">Deals</h2><p class="text-slate-500 text-xs mt-1">Direct regulatory overview over investment advisory contracts.</p></div>
    <div class="bg-white rounded-2xl border border-slate-100 overflow-hidden shadow-sm"><div class="overflow-x-auto"><table class="w-full text-left text-xs"><thead><tr class="bg-slate-50 border-b border-slate-100 text-slate-500 text-[10px] uppercase font-bold"><th class="p-4">Ref ID</th><th class="p-4">Client</th><th class="p-4">Scope</th><th class="p-4">Fee</th><th class="p-4">Status</th><th class="p-4">Date</th></tr></thead><tbody>${DB.mandates.map(m=>`<tr class="hover:bg-slate-50/60 border-b border-slate-100"><td class="p-4 font-bold text-slate-700">${m.id}</td><td class="p-4 font-bold text-slate-800">${m.client}</td><td class="p-4 text-slate-500">${m.target}</td><td class="p-4 font-extrabold text-brand-orange">${m.fee}</td><td class="p-4"><span class="bg-emerald-50 text-emerald-700 text-[10px] font-extrabold px-2.5 py-1 rounded-lg">${m.status}</span></td><td class="p-4 text-slate-400">${m.date}</td></tr>`).join('')}</tbody></table></div></div></section>`;
}

function renderPlaceholder(title, icon){const c=document.getElementById('app-content');c.innerHTML=`<section class="flex items-center justify-center h-full"><div class="text-center space-y-4"><div class="w-16 h-16 rounded-2xl bg-slate-100 flex items-center justify-center mx-auto"><i class="fa-solid ${icon} text-2xl text-slate-400"></i></div><h2 class="text-xl font-bold text-slate-700">${title}</h2><p class="text-slate-400 text-xs">Coming soon.</p></div></section>`}

function renderView(){
    switch(currentView){
        case 'dashboard': renderDashboard(); break;
        case 'crm': renderCRM(); break;
        case 'crm-detail': renderCRMDetail(); break;
        case 'deals': renderDeals(); break;
        case 'mandates': renderMandates(); break;
        case 'dataroom': renderPlaceholder('Data Room','fa-hard-drive'); break;
        case 'team': renderPlaceholder('Team Management','fa-users-gear'); break;
        case 'payments': renderPlaceholder('Payments','fa-receipt'); break;
        case 'reports': renderPlaceholder('Reports','fa-chart-simple'); break;
        case 'settings': renderPlaceholder('Settings & Logs','fa-gear'); break;
        default: renderDashboard();
    }
}

function handleSearch(term){console.log('Search:',term)}

// Init
window.onload = function(){
    buildSidebar();
    const hash = window.location.hash.replace('#','');
    if (hash) {
        const parts = hash.split('/');
        currentView = parts[0];
        currentParam = parts[1] || '';
    }
    renderView();
    highlightSidebar();
};

window.addEventListener('hashchange', function(){
    const hash = window.location.hash.replace('#','');
    if (hash) {
        const parts = hash.split('/');
        currentView = parts[0];
        currentParam = parts[1] || '';
    }
    renderView();
    highlightSidebar();
});

window.addEventListener('click', function(e){
    if(!e.target.closest('.relative')) document.getElementById('role-dropdown')?.classList.add('hidden');
});
</script>

    <style>
        :root {
            --charantra-orange: #F97316;
            --charantra-orange-hover: #EA580C;
            --sidebar-bg: #0B0C0E;
            --workspace-bg: #F8F9FC;
            --slate-border: #E2E8F0;
        }

        body {
            font-family: 'Titillium Web', sans-serif;
            font-size: 13.5px;
            background-color: var(--workspace-bg);
            color: #1E293B;
            overflow-x: hidden;
        }

        /* Clean animations */
        .fade-in-view {
            animation: cubicFadeIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes cubicFadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Premium rounded scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #E2E8F0;
            border-radius: 99px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #CBD5E1;
        }

        /* Sidebar active style - Orange block matching your mockup exactly */
        .sidebar-item-active {
            border-radius: 6px !important;
            background: var(--charantra-orange) !important;
            color: #FFFFFF !important;
            border: none !important;
        }

        /* Tab highlights */
        .subtab-active {
            color: var(--charantra-orange);
            border-bottom: 2px solid var(--charantra-orange);
        }

        /* Smooth interactive card effects */
        .interactive-card {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .interactive-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px -10px rgba(0, 0, 0, 0.04), 0 4px 10px -2px rgba(0, 0, 0, 0.02);
        }
        
        /* Modal Overlay Transition */
        .modal-active {
            display: flex !important;
            animation: fadeInOverlay 0.2s ease forwards;
        }
        @keyframes fadeInOverlay {
            from { background-color: rgba(0,0,0,0); }
            to { background-color: rgba(15, 17, 21, 0.6); }
        }

        /* Audio Waveform animation */
        @keyframes barPulse {
            0%, 100% { height: 4px; }
            50% { height: 28px; }
        }
        .waveform-bar-active {
            animation: barPulse 1.2s infinite ease-in-out;
        }
    </style>

        // Action workflow to advance/regress stages in real-time
        function shiftStage(dealId, direction) {
            const list = appState.dealsFlow === 'equity' ? appState.equityDeals : appState.maDeals;
            const deal = list.find(d => d.id === dealId);
            if (!deal) return;

            const stages = ['Investor Interest', 'NDA Signed', 'Data Room Access', 'Discussions', 'Due Diligence', 'Term Sheet / Closing'];
            let currentIdx = stages.findIndex(s => s.toLowerCase().replace(/\s+/g, '') === deal.stage.toLowerCase().replace(/\s+/g, ''));
            
            // Loose fallback for slight differences in stage namings
            if (currentIdx === -1) {
                if (deal.stage.includes('Interest')) currentIdx = 0;
                else if (deal.stage.includes('NDA')) currentIdx = 1;
                else if (deal.stage.includes('Room') || deal.stage.includes('Meeting')) currentIdx = 2;
                else if (deal.stage.includes('Discussion')) currentIdx = 3;
                else if (deal.stage.includes('Diligence')) currentIdx = 4;
                else currentIdx = 5;
            }

            let newIdx = currentIdx + direction;
            if (newIdx >= 0 && newIdx < stages.length) {
                deal.stage = stages[newIdx];
                
                // Update milestone structure status
                if (deal.milestones && deal.milestones[newIdx]) {
                    deal.milestones.forEach((m, idx) => {
                        if (idx < newIdx) m.status = 'completed';
                        else if (idx === newIdx) m.status = 'active';
                        else m.status = 'upcoming';
                    });
                }

                triggerToast(`Deal "${dealId}" moved to stage: "${stages[newIdx]}"`);
                renderWorkspace();
            }
        }

                        </div>
                        <div class="p-2.5 bg-white rounded-md shadow-xs">

                        </div>
                    </div>
                    <div class="flex gap-2">
                        <input id="deal-msg-input" type="text" placeholder="Draft secure response..." class="flex-1 p-2 bg-slate-50 border rounded-md text-xs outline-none focus:bg-white focus:border-orange-500 transition-all">
                        <button onclick="sendSecureMessage('${party}')" class="px-4 py-2 bg-orange-600 hover:bg-orange-700 text-white font-bold text-xs rounded-md transition-colors">Send</button>

        // Trigger dynamic message responses on modal
        function sendSecureMessage(sender) {
            const input = document.getElementById('deal-msg-input');
            const msg = input.value.trim();
            if (!msg) return;

            const scroller = document.getElementById('chat-scroller');
            const userMsg = document.createElement('div');
            userMsg.className = 'p-2.5 bg-white rounded-md shadow-xs';
            userMsg.innerHTML = `
                <p class="font-bold text-slate-900">${sender} <span class="text-[8px] font-mono font-normal text-slate-400">Just Now</span></p>
                <p class="text-slate-700 mt-0.5">${msg}</p>
            `;
            scroller.appendChild(userMsg);
            input.value = '';
            scroller.scrollTop = scroller.scrollHeight;
            triggerToast('Encrypted secure response dispatched to room ledger.');
        }

        // Core business logic to push new deal to state
        function createNewDeal(event) {
            event.preventDefault();
            const flow = document.getElementById('nd-flow').value;
            const stage = document.getElementById('nd-stage').value;
            const company = document.getElementById('nd-company').value.trim();
            const partner = document.getElementById('nd-partner').value.trim();
            const amount = document.getElementById('nd-amount').value.trim();
            const health = document.getElementById('nd-health').value;

            // Generate mock records based on selections
            const newId = flow === 'equity' ? `EQ-10${appState.equityDeals.length + 1}` : `MA-20${appState.maDeals.length + 1}`;
            const targetDeal = {
                id: newId,
                investee: company,
                investor: partner,
                seller: company,
                buyer: partner,
                round: flow === 'equity' ? 'Series A Round' : 'Strategic Buyout',
                amount: amount.startsWith('₹') ? amount : `₹${amount}`,
                stage: stage,
                health: health,
                lastActivity: 'Just Now',
                createdOn: '04 Jun 2026',
                owner: 'Karthik Super',
                age: '1 Day',
                indicativeValuation: '₹100.0 Cr',
                equityOffered: '15%',
                expectedClose: '30 Jul 2026',
                probability: '75%',
                milestones: [
                    { name: 'Investor Interest', status: 'completed', date: '04 Jun 2026', desc: 'Exploration logged' },
                    { name: 'NDA Signed', status: stage === 'Investor Interest' ? 'upcoming' : 'completed', date: '04 Jun 2026', desc: 'NDA Completed' },
                    { name: 'Data Room Access', status: 'upcoming', desc: 'Secure VDR audit' },
                    { name: 'Discussions', status: 'upcoming', desc: 'Commercial alignment' },
                    { name: 'Due Diligence', status: 'upcoming', desc: 'Auditing step' },
                    { name: 'Term Sheet', status: 'upcoming', desc: 'Upcoming' },
                    { name: 'Closing', status: 'upcoming', desc: 'Upcoming' }
                ],
                keyMetrics: { targetRaise: amount, valuation: '₹100.0 Cr', equity: '15%', committed: '₹0.0 Cr', investorsCount: 0, lastUpdated: '04 Jun 2026' },
                activities: [{ time: 'Just Now', type: 'system', text: 'Deal created inside active pipeline database.' }]
            };

            if (flow === 'equity') {
                appState.equityDeals.unshift(newId === 'EQ-101' ? newId : targetDeal);
                appState.counts.equityDeals++;
            } else {
                appState.maDeals.unshift(targetDeal);
                appState.counts.maDeals++;
            }

            appState.counts.totalDeals++;
            appState.dealsFlow = flow;

            closeModal();
            triggerToast(`New Transaction "${newId}" successfully launched.`);
            renderWorkspace();
        }

    <!-- CORE RENDER DESK -->
    <script>
        function renderWorkspace() {
            const container = document.getElementById('workspace-target');
            if (!container) return;
            container.innerHTML = '';

            let template = '';

            // Render workspace based on selected core module (SPA Routing)
            if (appState.activeModule === 'deals') {
                template = getDealsDashboardView();
            } else if (appState.activeModule === 'crm') {
                if (appState.viewMode === 'list') {
                    template = getDirectoryView();
                } else {
                    template = getCrmDetailView();
                }
            }

            container.innerHTML = template;
            updateSidebar();
            lucide.createIcons();
        }
    </script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const currentPath = window.location.pathname;
            const buttons = document.querySelectorAll('.sidebar-btn');
            buttons.forEach(btn => {
                const parent = btn.parentElement;
                if (parent && parent.tagName === 'A') {
                    const href = parent.getAttribute('href');
                    if (currentPath.includes(href.split('/').pop()) || (currentPath === '/' && href.includes('dashboard.html'))) {
                        btn.classList.add('sidebar-item-active');
                    }
                }
            });
        });
    </script>

    <style>
        :root {
            --charantra-orange: #F97316;
            --charantra-orange-hover: #EA580C;
            --sidebar-bg: #0B0C0E;
            --workspace-bg: #F8F9FC;
            --slate-border: #E2E8F0;
        }

        body {
            font-family: 'Titillium Web', sans-serif;
            font-size: 13px;
            background-color: var(--workspace-bg);
            color: #1E293B;
            overflow-x: hidden;
        }

        /* Clean animations */
        .fade-in-view {
            animation: cubicFadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes cubicFadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Premium rounded scrollbar */
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #E2E8F0;
            border-radius: 6px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #CBD5E1;
        }

        /* Sidebar active style - Rounded with thin outline matching image exactly */
        .sidebar-item-active {
            border-radius: 6px !important;
            background: var(--charantra-orange) !important;
            color: #FFFFFF !important;
            border: none !important;
        }

        /* Tab highlights */
        .subtab-active {
            color: var(--charantra-orange);
            border-bottom: 2px solid var(--charantra-orange);
        }

        /* Smooth interactive card effects with semi-rounded layout standards */
        .interactive-card {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .interactive-card:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px -8px rgba(0, 0, 0, 0.04), 0 2px 6px -2px rgba(0, 0, 0, 0.02);
        }
        
        /* Modal Overlay Transition */
        .modal-active {
            display: flex !important;
            animation: fadeInOverlay 0.15s ease forwards;
        }
        @keyframes fadeInOverlay {
            from { background-color: rgba(0,0,0,0); }
            to { background-color: rgba(15, 17, 21, 0.5); }
        }

        /* Audio Waveform animation */
        @keyframes barPulse {
            0%, 100% { height: 4px; }
            50% { height: 24px; }
        }
        .waveform-bar-active {
            animation: barPulse 1s infinite ease-in-out;
        }

        /* Tooltip configurations on action elements */
        [title] {
            position: relative;
        }
    </style>

                                            RM
                                        </div>

                                            <p class="font-bold text-slate-900 text-xs">${user.rmName}</p>

        // --- MEDIA STATE HANDLERS ---
        function toggleAudioState() {
            appState.isAudioPlaying = !appState.isAudioPlaying;
            renderWorkspace();
        }

        function toggleVideoState() {
            appState.isVideoPlaying = !appState.isVideoPlaying;
            renderWorkspace();
        }

        function toggleUserHoldState(userId) {
            // Traverse state users mapping
            for (const category in appState.users) {
                const targetUser = appState.users[category].find(u => u.id === userId);
                if (targetUser) {
                    targetUser.status = (targetUser.status === 'ON HOLD') ? 'ACTIVE' : 'ON HOLD';
                    break;
                }
            }
            renderWorkspace();
        }

        function closeModal() {
            const container = document.getElementById('modal-container');
            container.classList.remove('modal-active');
            container.classList.add('hidden');
            container.innerHTML = '';
        }
    </script>

    <script>
        // --- WORKSPACE CORE RENDER DESK ---
        function renderWorkspace() {
            const container = document.getElementById('workspace-target');
            if (!container) return;
            container.innerHTML = '';

            let template = '';
            if (appState.viewMode === 'list') {
                template = getDirectoryView();
            } else {
                template = getDetailView();
            }

            container.innerHTML = template;
            lucide.createIcons();
        }
    </script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const currentPath = window.location.pathname;
            const buttons = document.querySelectorAll('.sidebar-btn');
            buttons.forEach(btn => {
                const parent = btn.parentElement;
                if (parent && parent.tagName === 'A') {
                    const href = parent.getAttribute('href');
                    if (currentPath.includes(href.split('/').pop()) || (currentPath === '/' && href.includes('dashboard.html'))) {
                        btn.classList.add('sidebar-item-active');
                    }
                }
            });
        });
    </script>

</body>
</html>
